name: Release plugin

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build release JAR
        run: mvn --batch-mode --no-transfer-progress clean package

      - name: Generate release notes and publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          body_path: .github/release-notes/${{ inputs.tag || github.ref_name }}.md
          generate_release_notes: false
          files: |
            README.md
            IMPROVEMENTS.md
            PROJECT_REVIEW.md
            ${{ (inputs.tag || github.ref_name) == 'v1.9.0' && 'target/DiscordSRVStatusEmbed-*.jar' || '' }}
